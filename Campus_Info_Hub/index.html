<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Info Hub</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; padding: 20px; }
        nav { margin-bottom: 20px; border-bottom: 1px solid #ccc; padding-bottom: 10px; }
        .resource-card { border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
        .tag { background: #eee; padding: 2px 6px; border-radius: 3px; font-size: 0.8em; margin-right: 5px; }
        button { cursor: pointer; margin-right: 5px; padding: 5px 10px; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a> | 
        <a href="pages/library.html">Biblioteca</a> | 
        <a href="pages/cafeteria.html">Cantina</a> |
        <a href="pages/events.html">Evenimente</a> |
        <a href="data/resources.json">Date JSON</a> |
        <a href="https://github.com" target="_blank">GitHub (URL Absolut)</a>
    </nav>

    <h1>Campus Info Hub</h1>
    <p>Aplicație pentru gestionarea resurselor din campus.</p>

    <div>
        <strong>Filtrează:</strong>
        <button onclick="displayResources(allData)">Toate</button>
        <button onclick="filterByType('studiu')">Doar Studiu</button>
        <button onclick="filterByType('food')">Doar Cantină</button>
        <button onclick="filterByType('eveniment')">Doar Evenimente</button>
    </div>

    <div id="resource-container" style="margin-top: 20px;">
        <p>Se încarcă resursele...</p>
    </div>

    <script>
        let allData = [];

    
        async function fetchResources() {
            try {
                const response = await fetch('data/resources.json');
                allData = await response.json();
                displayResources(allData);
            } catch (error) {
                document.getElementById('resource-container').innerHTML = "Eroare la încărcarea datelor.";
                console.error(error);
            }
        }

        function displayResources(data) {
            const container = document.getElementById('resource-container');
            container.innerHTML = "";

            if (data.length === 0) {
                container.innerHTML = "<p>Nicio resursă găsită.</p>";
                return;
            }

            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'resource-card';
          
                const tagsHtml = item.tags.map(tag => `<span class="tag">#${tag}</span>`).join('');

                card.innerHTML = `
                    <h3>${item.name}</h3>
                    <p><strong>Locație:</strong> ${item.location}</p>
                    <p><strong>Program:</strong> ${item.program}</p>
                    <div>${tagsHtml}</div>
                `;
                container.appendChild(card);
            });
        }

        function filterByType(type) {
            const filtered = allData.filter(item => item.type === type);
            displayResources(filtered);
        }

        fetchResources();
    </script>
</body>
</html>
